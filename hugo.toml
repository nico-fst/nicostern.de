# identifier = "search"
# name = "search"
# url = "/search/"
# weight = 10

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 10

[[menu.main]]
identifier = "posts"
name = "Projects"
url = "/posts/"
weight = 10

